<script type="module">
    export default {
        tag: 'home-page',
        dependencies: [
            { tag: 'counter', import: '../components/counter.ok.html' }
        ],
        context() {
            return {
                stats: [
                    { label: 'Total Users', value: '1,024', change: '+12%', positive: true },
                    { label: 'Active Sessions', value: '312', change: '+5%', positive: true },
                    { label: 'Bounce Rate', value: '24%', change: '-2%', positive: false }
                ],
                recentActivity: [
                    { id: 1, user: 'Alice Smith', action: 'Created a new project', time: '2 mins ago' },
                    { id: 2, user: 'Bob Johnson', action: 'Upgraded subscription', time: '1 hour ago' },
                    { id: 3, user: 'System', action: 'Database backup completed', time: '3 hours ago' },
                    { id: 4, user: 'Charlie Lee', action: 'Invited a team member', time: '5 hours ago' }
                ],
                tasks: [
                    { id: 1, text: 'Review new feature branch', done: false },
                    { id: 2, text: 'Update documentation for OK.js', done: true },
                    { id: 3, text: 'Prepare weekly report', done: false }
                ],
                newTask: '',
                addTask() {
                    const txt = this.newTask.trim();
                    if (!txt) return;
                    this.tasks.push({ id: Date.now(), text: txt, done: false });
                    this.newTask = '';
                },
                removeTask(id) {
                    this.tasks = this.tasks.filter(t => t.id !== id);
                }
            };
        }
    };
</script>

<template>
    <div class="dashboard">
        <header class="dash-header">
            <div>
                <h1 class="dash-title">Welcome back, Admin</h1>
                <p class="dash-subtitle">Here is what's happening today.</p>
            </div>
            <div class="dash-actions">
                <button class="btn-primary">New Project</button>
            </div>
        </header>

        <div class="stats-grid">
            <each :of="stats" let:stat>
                <div class="stat-card">
                    <div class="stat-label">{{ stat.label }}</div>
                    <div class="stat-value">
                        <span>{{ stat.value }}</span>
                        <span class="stat-change" :class="stat.positive ? 'positive' : 'negative'">
                            {{ stat.change }}
                        </span>
                    </div>
                </div>
            </each>
        </div>

        <div class="dash-grid">
            <div class="card col-span-2">
                <div class="card-header">
                    <h2 class="card-title">Recent Activity</h2>
                </div>
                <ul class="activity-list">
                    <each :of="recentActivity" let:item>
                        <li class="activity-item">
                            <div class="activity-avatar">{{ item.user.charAt(0) }}</div>
                            <div class="activity-details">
                                <p class="activity-desc"><strong>{{ item.user }}</strong> {{ item.action }}</p>
                                <p class="activity-time">{{ item.time }}</p>
                            </div>
                        </li>
                    </each>
                </ul>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Tasks</h2>
                    <span class="badge">{{ tasks.length }} total</span>
                </div>

                <form class="task-form" @submit:prevent="addTask()">
                    <input class="task-input" type="text" !new-task placeholder="Add a new task..." />
                    <button class="btn-secondary" type="submit" :disabled="!newTask.trim()">Add</button>
                </form>

                <ul class="task-list">
                    <each :of="tasks" let:task>
                        <li class="task-item" :class="{ completed: task.done }">
                            <label class="task-label">
                                <input type="checkbox" :checked="task.done" @change="task.done = $event.target.checked" />
                                <span>{{ task.text }}</span>
                            </label>
                            <button class="btn-icon" @click="removeTask(task.id)" title="Remove task">×</button>
                        </li>
                    </each>
                    <if :="!tasks.length">
                        <li class="task-empty">No tasks remaining! 🎉</li>
                    </if>
                </ul>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Counter Component</h2>
                </div>
                <div class="card-body">
                    <p class="text-muted mb-4">A simple reactive counter component loaded from <code>components/counter.ok.html</code>.</p>
                    <counter></counter>
                </div>
            </div>
        </div>
    </div>
